name: Update README with Substack Posts
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  update-readme-with-blog:
    name: Update this repo's README
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Pull Substack RSS
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://nueveentradas.substack.com/feed"
          max_post_count: 5
          comment_tag_name: "BLOG-POST-LIST"
          # Replace 'Your Name' with your exact Substack author profile name
          tag_post_pre_filter: "tags.creator == 'Daniel Roa'" 
